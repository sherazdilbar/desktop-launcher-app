<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1>✏️ Edit User</h1>
            <p>Update user information</p>
        </header>

        <div class="card">
            <form method="post" th:action="@{/users/{id}(id=${user.id})}">
                <div class="form-group">
                    <label for="id">User ID (cannot be changed)</label>
                    <input type="text" id="id" th:value="${user.id}" disabled>
                </div>

                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" th:value="${user.name}" required>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-success">Update User</button>
                    <a th:href="@{/users/{id}(id=${user.id})}" class="btn btn-primary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
